info:
  name: Listar indicadores
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/biblioteca-congreso-nacional"

settings:
  encodeUrl: true

docs: |-
  Lista todos los indicadores disponibles en el módulo biblioteca-congreso-nacional.

  Respuesta esperada:
  ```json
  {
    "indicators": ["valdivia-tasa-pobreza-ingresos", "valdivia-organizaciones-comunitaras"]
  }
  ```
