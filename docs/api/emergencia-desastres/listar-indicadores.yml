http:
  method: GET
  url: "{{baseUrl}}/emergencia-desastres"

settings:
  encodeUrl: true

docs: |-
  Lista todos los indicadores disponibles en el módulo emergencia-desastres.

  Respuesta esperada:
  ```json
  {
    "indicators": ["simulacros-2021", "simulacros-2022", "simulacros-2023"]
  }
  ```
